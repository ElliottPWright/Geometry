# Run with prek (https://github.com/j178/prek), a drop-in pre-commit replacement.
# The hook tools are provided by the pixi `lint` environment (see pixi.toml), so
# versions are tracked in pixi.lock and the hooks run identically everywhere.
#
#   pixi run install-hooks   # one-off: install the git hooks
#   pixi run lint            # run all hooks on all files
repos:
  # prek runs these as native Rust builtins (no environment, fully portable).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Tools below come from the pixi `lint` environment via language: system.
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        language: system
        entry: clang-format -i
        types_or: [c++, c]

      - id: cpplint
        name: cpplint
        language: system
        entry: cpplint
        args:
          - '--filter=-build/include_subdir,-build/include_order,-build/c++17,-build/include_what_you_use,-build/namespaces,-legal/copyright,-readability/todo,-runtime/references,-whitespace/indent,-whitespace/line_length'
        types: [c++]

      - id: codespell
        name: codespell
        language: system
        entry: codespell
        types: [text]
        exclude: ^pixi\.lock$

      - id: cmakelint
        name: cmakelint
        language: system
        entry: cmakelint
        args: ['--filter=-linelength,-readability/wonkycase']
        files: (\.cmake|CMakeLists\.txt)$

      - id: gersemi
        name: gersemi
        language: system
        entry: gersemi -i
        files: (\.cmake|CMakeLists\.txt)$

      - id: commitizen
        name: commitizen (conventional commits)
        language: system
        entry: cz check --commit-msg-file
        stages: [commit-msg]
