[workspace]
name = "shipgeometry"
description = "SHiP detector geometry implementation using GeoModel"
channels = ["https://prefix.dev/ship", "conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]
requires-pixi = ">=0.68"

# Lets downstream dev environments (geometry_service, aegir, ...) consume the
# geometry from source: `shipgeometry = { path = "../geometry" }`. Mirrors
# ship-conda-recipes/recipes/shipgeometry (the release recipe); keep the
# version and the host dependencies in lockstep with it.
[package]
name = "shipgeometry"
version = "0.2.1"

[package.build]
backend = { name = "pixi-build-cmake", version = "0.*" }

[package.build.config]
extra-args = [
    "-DCMAKE_CXX_STANDARD=20",
    "-DCMAKE_INSTALL_LIBDIR=lib",
    "-DBUILD_TESTING=OFF",
]

# eigen-abi-devel and nlohmann_json are needed for the same GeoModel CMake
# config reasons documented in the release recipe.
[package.host-dependencies]
geomodel-core = "*"
geomodel-tools = "*"
sqlite = "*"
tomlplusplus = "*"
eigen-abi-devel = "*"
nlohmann_json = "*"

[dependencies]
cxx-compiler = "*"
cmake = ">=3.16"
make = "*"
ninja = "*"
git = "*"
sqlite = "*"
tomlplusplus = "*"
geomodel = ">=6.22"
eigen-abi-devel = "*"
nlohmann_json = "*"

[tasks]
configure = "cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo"
build = { cmd = "cmake --build build -j", depends-on = ["configure"] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = ["build"] }
geometry = { cmd = "./build/apps/build_geometry build/ship_geometry.db", depends-on = ["build"] }
gdml = { cmd = "gm2gdml -g build/ship_geometry.db -o build/ship_geometry.gdml", depends-on = ["geometry"] }

# Linting / formatting toolchain. prek orchestrates the hooks; the tools come
# from this environment so versions are tracked in pixi.lock and run identically
# everywhere (including NixOS). See .pre-commit-config.yaml.
[feature.lint.dependencies]
prek = "*"
python = ">=3.11"
clang-format = "22.*"
codespell = "*"
cmakelint = "*"
reuse = "*"
cffconvert = "*"
commitizen = "*"

# Pinned via PyPI to match the previous hook revs exactly: conda-forge's cpplint
# is stuck at 1.6.0 (a different, stale fork), and its gersemi (0.24.0) lags the
# repo's 0.27.7 and would reflow CMake files.
[feature.lint.pypi-dependencies]
cpplint = "==2.0.2"
gersemi = "==0.27.7"

[feature.lint.tasks]
lint = "prek run --all-files"
# Install the git hooks and route them through `pixi run` so the conda-provided
# hook tools are on PATH at commit time (required on NixOS, where the tools are
# not runnable without pixi activation).
install-hooks = '''
prek install --hook-type pre-commit --hook-type commit-msg
hooks=$(git rev-parse --git-path hooks)
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/pre-commit"
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/commit-msg"
'''

[environments]
lint = { features = ["lint"], solve-group = "lint" }
